name: Theme checks

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  php-syntax:
    name: PHP syntax
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          coverage: none

      - name: Check PHP files
        shell: bash
        run: find . -name "*.php" -print0 | xargs -0 -n1 php -l

  css:
    name: CSS validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install CSS checker
        run: npm ci

      - name: Check CSS files
        run: npm run lint:css
